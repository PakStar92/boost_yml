name: Battle Test — Deno 2.x

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  test:
    name: Deno 2.x / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ffmpeg (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg

      - name: Install ffmpeg (macOS)
        if: runner.os == 'macOS'
        run: brew install ffmpeg

      - name: Install ffmpeg (Windows)
        if: runner.os == 'Windows'
        run: choco install ffmpeg -y

      - name: Verify ffmpeg & ffprobe
        run: |
          ffmpeg -version
          ffprobe -version

      - name: Setup Deno 2.x
        uses: denoland/setup-deno@v2
        with:
          deno-version: "~2"

      - name: Show Deno version
        run: deno --version

      # Deno npm compat reads from node_modules — install first
      - name: Install npm deps
        run: npm install

      - name: Run battle test (Deno)
        id: test
        continue-on-error: true
        shell: bash
        run: |
          deno run \
            --allow-run \
            --allow-read \
            --allow-write \
            --allow-env \
            --allow-net \
            test.mjs 2>&1 | tee test-output-deno.txt

      - name: Show final log
        if: always()
        shell: bash
        run: |
          echo "=========================================="
          echo "  FINAL TEST LOG — Deno 2.x / ${{ matrix.os }}"
          echo "=========================================="
          cat test-output-deno.txt || echo "(no output file)"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-output-deno-${{ matrix.os }}
          path: test-output-deno.txt
          if-no-files-found: ignore

      - name: Fail if tests failed
        if: steps.test.outcome == 'failure'
        run: exit 1
