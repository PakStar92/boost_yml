name: Battle Test — Node.js

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  test:
    name: Node ${{ matrix.node }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: ["20", "22", "24"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── ffmpeg ──────────────────────────────────────────────────────────
      - name: Install ffmpeg (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg

      - name: Install ffmpeg (macOS)
        if: runner.os == 'macOS'
        run: brew install ffmpeg

      - name: Install ffmpeg (Windows)
        if: runner.os == 'Windows'
        run: choco install ffmpeg -y

      - name: Verify ffmpeg & ffprobe
        run: |
          ffmpeg -version
          ffprobe -version

      # ── Node.js ─────────────────────────────────────────────────────────
      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Install dependencies
        run: npm install

      # ── run tests ───────────────────────────────────────────────────────
      - name: Run battle test
        id: test
        continue-on-error: true
        run: node test.mjs 2>&1 | tee test-output.txt

      - name: Show test output summary
        if: always()
        shell: bash
        run: |
          echo "=========================================="
          echo "  FINAL TEST LOG — Node ${{ matrix.node }} / ${{ matrix.os }}"
          echo "=========================================="
          cat test-output.txt || echo "(no output file)"

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-output-node-${{ matrix.node }}-${{ matrix.os }}
          path: |
            test-output.txt
          if-no-files-found: ignore

      - name: Fail job if tests failed
        if: steps.test.outcome == 'failure'
        run: |
          echo "Tests reported failures. See above log for all errors."
          exit 1
