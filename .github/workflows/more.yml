name: More

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  boost-install:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20, 21, 22, 23, 24, 25]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}

      - name: Clean and Install
        run: |
          npm cache clean --force
          npm install mediaforge gspeak --no-save
