name: Battle Test — Bun

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  test:
    name: Bun / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── ffmpeg ──────────────────────────────────────────────────────────
      - name: Install ffmpeg (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg

      - name: Install ffmpeg (macOS)
        if: runner.os == 'macOS'
        run: brew install ffmpeg

      - name: Install ffmpeg (Windows)
        if: runner.os == 'Windows'
        run: choco install ffmpeg -y

      - name: Verify ffmpeg & ffprobe
        run: |
          ffmpeg -version
          ffprobe -version

      # ── Bun ─────────────────────────────────────────────────────────────
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Show Bun version
        run: bun --version

      - name: Install dependencies
        run: bun install

      # ── run tests ───────────────────────────────────────────────────────
      - name: Run battle test (Bun)
        id: test
        continue-on-error: true
        shell: bash
        run: bun run test.mjs 2>&1 | tee test-output-bun.txt

      - name: Show test output summary
        if: always()
        shell: bash
        run: |
          echo "=========================================="
          echo "  FINAL TEST LOG — Bun / ${{ matrix.os }}"
          echo "=========================================="
          cat test-output-bun.txt || echo "(no output file)"

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-output-bun-${{ matrix.os }}
          path: |
            test-output-bun.txt
          if-no-files-found: ignore

      - name: Fail job if tests failed
        if: steps.test.outcome == 'failure'
        run: |
          echo "Tests reported failures. See above log for all errors."
          exit 1
