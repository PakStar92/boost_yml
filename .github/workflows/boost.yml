name: Download-Booster

on:
  push:
    branches:
      - main
  schedule:
    - cron: '*/15 * * * *'
    - cron: '*/20 * * * *'
    - cron: '*/25 * * * *'
    - cron: '*/30 * * * *'
    - cron: '*/35 * * * *'
    - cron: '*/40 * * * *'
    - cron: '*/45 * * * *'
    - cron: '*/50 * * * *'
    - cron: '*/55 * * * *'
  workflow_dispatch:

jobs:
  # JOB 1: Booster
  booster-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 19, 20, 21, 22, 23, 24, 25] # Stick to LTS/Even versions for stability, or keep all

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Clean and Install
        run: |
          npm install stickers-formatter mediaforge gspeak api-qasim --no-save

  # JOB 2: Faster
  faster-multi-os:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
        node-version: [18, 19, 20, 21, 22, 23, 24, 25]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}

      - name: Clean and Install
        shell: bash
        run: |
          npm install api-qasim stickers-formatter mediaforge gspeak --no-save

  # JOB 3: More
  more-minimal:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 19, 20, 21, 22, 23, 24, 25]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}

      - name: Clean and Install
        run: |
          npm install mediaforge gspeak kinetex --no-save

      - name: JSR Install
        run: |
          npx jsr add @globaltech/mediaforge @globaltech/gspeak @kinetexjs/kinetex
